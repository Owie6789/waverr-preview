<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Waverr | Music Discovery</title>



    <link rel="icon" type="image/png" href="assets/logo.png">

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>



    <style>
        body {

            font-family: 'DM Sans', sans-serif;

            background-color: #121212;

            background-image: url('assets/background.png');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            margin: 0;
            overflow: hidden;

        }



        /* Universal Click Interaction - Excludes static elements */
        /* Lock down interactions: prevent text selection and image download */
        * {
            user-select: none;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        button:not(.static-element),

        .clickable:not(.static-element),

        .menu-item:not(.no-hover),

        .search-container {

            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            cursor: pointer;

        }



        button:not(.static-element):active,

        .clickable:not(.static-element):active,

        .menu-item:not(.no-hover):active,

        .search-container:active,

        #profile-wrapper:active {

            transform: scale(0.96);

        }



        .small-brand-text {

            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.07em;

            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 45%, #e0e0e0 100%);

            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.15));

        }



        .hero-watermark {

            font-size: 48vw;
            font-weight: 800;
            letter-spacing: -0.1em;
            line-height: 0.8;

            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 85%);

            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            user-select: none;
            white-space: nowrap;
            pointer-events: none;

        }



        .glass-panel {

            background: rgba(20, 20, 20, 0.65);

            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);

            border: 1px solid rgba(255, 255, 255, 0.1);

        }



        /* Search Section */

        .search-container {

            position: relative;
            width: 100%;
            max-width: 720px;

            background: rgba(255, 255, 255, 0.04);

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border-radius: 9999px;

            border: 1px solid rgba(255, 255, 255, 0.1);

            transition:

                transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275),

                background 0.4s ease-in-out,

                box-shadow 0.4s ease-in-out,

                border-color 0.4s ease-in-out;

        }



        .glass-search-input {

            width: 100%;
            background: transparent;

            border: none;

            border-radius: 9999px;
            padding: 14px 55px 14px 60px;
            color: white;
            outline: none;

            font-size: 1rem;

        }



        .search-container:hover {

            background: rgba(255, 255, 255, 0.08);

            border-color: rgba(255, 255, 255, 0.2);

            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);

        }



        .search-container:focus-within {

            background: rgba(255, 255, 255, 0.09);

            border-color: rgba(255, 255, 255, 0.3);

            box-shadow: 0 0 35px rgba(255, 255, 255, 0.15);

        }



        .search-icon-wrapper {

            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);

            display: flex;
            align-items: center;
            pointer-events: none;

        }



        /* X Button Fixes */

        .clear-x {

            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 56px;

            color: rgba(255, 255, 255, 0.4);

            opacity: 0;

            pointer-events: none;
            /* Initially non-clickable when invisible */

            transition: opacity 0.3s ease-in-out, background 0.2s, color 0.2s;

            z-index: 10;

            display: flex;
            align-items: center;
            justify-content: center;

            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;

            cursor: pointer;

        }

        .clear-x.visible {

            opacity: 1;

            pointer-events: auto;
            /* Clickable when visible */

        }

        .clear-x:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 32px;
            height: 32px;
            background: transparent;
            color: #ff3b3b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            border: none;
            transition: transform 0.2s, background 0.2s, color 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 59, 59, 0.15);
            color: #ff5252;
        }

        .modal-close:active {
            transform: scale(0.9);
        }



        /* Dynamic Profile Pill */
        #profile-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.3s,
                border-color 0.3s,
                transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        #profile-wrapper:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #profile-wrapper.is-open {
            width: 96px;
            background: rgba(40, 40, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #profile-wrapper #profile-back-btn {
            position: absolute;
            left: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.6);
            transform: translateX(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
        }

        #profile-wrapper.is-open #profile-back-btn {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        #profile-wrapper #profile-back-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
        }

        #profile-trigger {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.3s, border 0.3s;
            overflow: hidden;
            border: 2px solid transparent;
        }

        #profile-wrapper.is-open #profile-trigger {
            transform: scale(0.85);
            background: #1a1a1a;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }



        /* Profile Menu */

        #profile-menu {

            display: none;
            position: absolute;
            right: 0;
            top: 62px;

            width: 240px;
            border-radius: 20px;
            z-index: 50;
            padding: 8px;

            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);

            transform-origin: top right;

            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        }



        @keyframes slideDown {

            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

        }



        .menu-item {

            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.8);

            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;

        }

        .menu-item:hover:not(.no-hover) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }



        /* Settings Modal */

        #settings-modal {

            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;

            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, 0.4);

            backdrop-filter: blur(8px);

        }



        .avatar-container {

            position: relative;
            width: 130px;
            height: 130px;

        }



        .avatar-circle {

            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;

            background: #222;
            border: 3px solid rgba(255, 255, 255, 0.08);

        }



        .pen-overlay {

            position: absolute;
            inset: 0;
            border-radius: 50%;

            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;

            justify-content: center;
            opacity: 0;
            transition: 0.3s;

            pointer-events: none;

        }



        .avatar-container:hover .pen-overlay {
            opacity: 1;
        }



        .delete-btn {

            position: absolute;
            bottom: 4px;
            right: 4px;

            background: #ff4141;
            width: 34px;
            height: 34px;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            border: 4px solid #1a1a1a;
            z-index: 10;

        }



        .name-input-wrapper {

            position: relative;
            width: 100%;

        }



        .input-icon-left {

            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);

            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            pointer-events: none;

            transition: opacity 0.3s ease-in-out;
            z-index: 10;

            display: flex;
            align-items: center;
            justify-content: center;

        }

        .input-icon-left.visible {
            opacity: 1;
            pointer-events: auto;
        }



        .input-icon-right {

            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);

            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;

        }



        .settings-input {

            width: 100%;
            background: rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 18px;
            padding: 16px 50px 16px 50px;
            color: white;

            font-weight: 600;
            font-size: 1.1rem;
            outline: none;

        }



        .save-btn {

            width: calc(100% - 24px);

            margin: 0 12px;

            padding: 16px;

            background: white;
            color: black;

            border-radius: 20px;

            display: flex;
            align-items: center;
            justify-content: center;

            gap: 12px;

            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);

            font-weight: 700;
            font-size: 1.125rem;

        }

        .save-btn:hover {
            background: #f0f0f0;
        }



        #toast {

            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);

            background: white;
            color: black;
            padding: 14px 28px;
            border-radius: 14px;

            font-weight: 700;
            transition: 0.5s;
            z-index: 200;

        }
    </style>

</head>

<body class="min-h-screen flex flex-col">

                        onclick="removeAvatar(event)">

                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>

                    </button>

                </div>



                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(this)">



                <div class="name-input-wrapper">

                    <div id="name-clear" class="input-icon-left clickable static-element" onclick="clearName()">

                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>

                    </div>



                    <input type="text" id="name-input" placeholder="Display Name" class="settings-input"
                        oninput="handleNameInput(this.value)">



                    <div class="input-icon-right">

                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>

                    </div>

                </div>

            </div>



            <button onclick="saveChanges()" class="save-btn">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>

                Save Changes

            </button>

        </div>

    </div>



    <main class="flex-grow flex items-center justify-center relative">

        <h1 class="hero-watermark">waverr</h1>

    </main>



    <script>

        let userData = {

            name: localStorage.getItem('waverr_name') || 'user',

            avatar: localStorage.getItem('waverr_avatar') || null

        };



        function init() {

            syncGreeting(userData.name);

            if (userData.avatar) updateAppAvatar(userData.avatar);

        }



        function handleSearch(val) {

            const clearBtn = document.getElementById('clear-search');

            if (val.length > 0) clearBtn.classList.add('visible');

            else clearBtn.classList.remove('visible');

        }



        function clearSearch(e) {

            if (e) e.stopPropagation();

            const search = document.getElementById('main-search');

            search.value = '';

            handleSearch('');

            search.focus();

        }



        function handleNameInput(val) {

            const nameClear = document.getElementById('name-clear');

            if (val.length > 0) nameClear.classList.add('visible');

            else nameClear.classList.remove('visible');

        }



        function clearName() {

            const input = document.getElementById('name-input');

            input.value = '';

            handleNameInput('');

            input.focus();

        }



        function toggleMenu(e) {

            if (e) e.stopPropagation();

            const menu = document.getElementById('profile-menu');
            const wrapper = document.getElementById('profile-wrapper');

            if (menu.style.display === 'block') {
                menu.style.display = 'none';
                if (wrapper) wrapper.classList.remove('is-open');
            } else {
                menu.style.display = 'block';
                if (wrapper) wrapper.classList.add('is-open');
            }

        }



        function openModal() {

            document.getElementById('settings-modal').style.display = 'flex';

            document.getElementById('profile-menu').style.display = 'none';
            const wrapper = document.getElementById('profile-wrapper');
            if (wrapper) wrapper.classList.remove('is-open');

            const nameInput = document.getElementById('name-input');
            nameInput.value = userData.name;
            handleNameInput(userData.name);

            if (userData.avatar) {
                updateModalAvatar(userData.avatar);
            } else {
                removeModalAvatar();
            }

        }



        function closeModal() {

            document.getElementById('settings-modal').style.display = 'none';

        }



        function syncGreeting(val) {

            document.getElementById('greeting-name').innerText = val || 'user';

        }



        function handleFile(input) {

            if (input.files && input.files[0]) {

                const reader = new FileReader();

                reader.onload = function (e) {

                    updateModalAvatar(e.target.result);

                };

                reader.readAsDataURL(input.files[0]);

            }

        }



        function updateAppAvatar(src) {
            const imgs = ['nav-avatar', 'menu-avatar-small'];
            const icons = ['nav-icon', 'menu-icon-small'];
            imgs.forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.src = src; el.classList.remove('hidden'); }
            });
            icons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
        }

        function removeAppAvatar() {
            const imgs = ['nav-avatar', 'menu-avatar-small'];
            const icons = ['nav-icon', 'menu-icon-small'];
            imgs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            icons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('hidden');
            });
        }

        function updateModalAvatar(src) {
            const el = document.getElementById('modal-avatar');
            el.src = src;
            el.classList.remove('hidden');
            document.getElementById('modal-icon-placeholder').classList.add('hidden');
            document.getElementById('delete-avatar-btn').classList.remove('hidden');
        }

        function removeModalAvatar() {
            document.getElementById('modal-avatar').classList.add('hidden');
            document.getElementById('modal-icon-placeholder').classList.remove('hidden');
            document.getElementById('delete-avatar-btn').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function removeAvatar(e) {

            e.stopPropagation();

            removeModalAvatar();

        }



        function saveChanges() {

            const newName = document.getElementById('name-input').value || 'user';
            const avatarImg = document.getElementById('modal-avatar');
            const hasAvatar = !avatarImg.classList.contains('hidden');

            userData.name = newName;
            localStorage.setItem('waverr_name', newName);
            syncGreeting(newName);

            if (hasAvatar) {
                userData.avatar = avatarImg.src;
                localStorage.setItem('waverr_avatar', avatarImg.src);
                updateAppAvatar(avatarImg.src);
            } else {
                userData.avatar = null;
                localStorage.removeItem('waverr_avatar');
                removeAppAvatar();
            }

            showToast();

            closeModal();

        }



        function showToast() {

            const t = document.getElementById('toast');

            t.style.bottom = "30px";

            setTimeout(() => t.style.bottom = "-60px", 3000);

        }



        window.onclick = function (event) {

            if (!event.target.closest('#profile-wrapper') && !event.target.closest('#profile-menu')) {

                const menu = document.getElementById('profile-menu');
                const wrapper = document.getElementById('profile-wrapper');

                if (menu) menu.style.display = 'none';
                if (wrapper) wrapper.classList.remove('is-open');

            }

        }



        init();

    </script>

</body>

</html>
